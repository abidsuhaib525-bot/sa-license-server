name: Auto Release Extension
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install deps (if any)
        run: |
          if [ -f package.json ]; then npm ci --prefer-offline --no-audit 2>/dev/null || true; fi
      - name: Create extension zip
        run: |
          cd "${{ github.workspace }}"
          zip -r extension.zip . \
            -x "*.git*" "*.github*" "*.md" "*.yml" "*.yaml" "*.zip" "*.crx" "*.pem" "node_modules/*" ".gitignore" ".gitattributes" "*.log" "*.tmp" "*.bak" "*.swp" "*.swo" "*~" ".DS_Store" "Thumbs.db" "*.orig" "*.rej" "*.patch" "*.diff" "*.log"
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: extension.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}