name: Build & Release Extension

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        shell: bash
        run: |
          VER=$(jq -r '.version' manifest.json)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v$VER" >> $GITHUB_OUTPUT

      - name: Create ZIP
        shell: bash
        run: |
          mkdir -p dist
          git archive --format=zip --output=dist/extension-${{ steps.version.outputs.version }}.zip HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version }}"
          body_path: CHANGELOG.md
          files: dist/extension-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Supabase Storage
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          ZIP="dist/extension-${{ steps.version.outputs.version }}.zip"
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/extension-releases/extension-${{ steps.version.outputs.version }}.zip" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/zip" \
            --data-binary "@$ZIP"

      - name: Update extension_versions table
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          DOWNLOAD_URL="${{ secrets.SUPABASE_URL }}/storage/v1/object/public/extension-releases/extension-${{ steps.version.outputs.version }}.zip"

          # Deactivate old active rows
          curl -s -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/extension_versions?is_active=eq.true" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"is_active":false}'

          # Insert new version row
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/extension_versions" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"version":"${{ steps.version.outputs.version }}","download_url":"'"$DOWNLOAD_URL"'","release_notes":"See CHANGELOG.md for details","is_active":true}'
